# Input file for rcwa.py. Define source, superstrate, substrate and as many layers as you want in between them. 

# wavelength is in free space
# te and tm amplitudes are complex numbers represented by list; they are renormalised inside the code to ensure a total amplitude of 1
# epsilon and mu are relative permeability and permittivity
# thickness is defined in the same units as wavelength
# epsilon for homogeneous layer is defined by a single float. For inhomogeneous layer - by providing a path to .csv file containing epsilon map


[source]
wavelength = 2.0
theta = 60.0
#theta = 0.00001
phi = 30.0
#phi = 0.00001
te_amplitude = [0.70711, 0.0]
#te_amplitude = [1.0, 0.0]
tm_amplitude = [0.0, 0.70711]
#tm_amplitude = [0.0, 0.0]

[superstrate]
epsilon = 9.0

[common_to_all_layers]
period_x = 1.75
period_y = 1.5
harmonics_x = 3
harmonics_y = 3

[[layer]]
epsilon = '/home/gleb/programming/python/rcwa/rcwa_example_epsilon.csv'
thickness = 0.5

[[layer]] 
epsilon = 6.0
thickness = 0.3

[substrate]
epsilon = 2.0
